<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - EsportsHub</title>
  <link rel="stylesheet" href="signup.css">
</head>
<body>

  <div class="signup-container">
    <form class="signup-form">
      
      
      <div class="form-header">
        <h2>Create Account</h2>
        <p>Join the ultimate esports community</p>
      </div>

      <!-- Username Input -->
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g., GamerX" required>
      </div>

      <!-- Email Input -->
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <!-- Password Input -->
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required>
      </div>

      <!-- Terms and Conditions Checkbox Check -->
      <div class="checkbox-group">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to the <a href="/terms">Terms & Conditions</a></label>
      </div>

      <!-- Submit Action Button -->
      <button type="submit" class="submit-btn">Sign Up</button>

      <!-- Toggle to Login Page -->
      <p class="form-footer">
        Already have an account? <a href="/login">Log In</a>
      </p>

    </form>
  </div>
<script src="signup.js" defer></script>

</body>
</html>
